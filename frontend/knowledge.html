<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Koottam — Knowledge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#05050e;--s1:rgba(255,255,255,.026);--s2:rgba(255,255,255,.042);
  --bd:rgba(255,255,255,.07);--bd2:rgba(255,255,255,.12);
  --tx:#e2e2f0;--tx2:rgba(226,226,240,.55);--tx3:rgba(226,226,240,.28);
  --mu:#3d3d5c;--ind:#6366f1;--ind2:#818cf8;
  --font:'Outfit',sans-serif;
  --ease:cubic-bezier(.32,.72,0,1);--ease2:cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 50% at 12% 8%,rgba(99,60,241,.08) 0%,transparent 60%),
    radial-gradient(ellipse 50% 40% at 88% 90%,rgba(34,211,238,.04) 0%,transparent 58%),
    radial-gradient(ellipse 35% 30% at 55% 48%,rgba(168,85,247,.035) 0%,transparent 65%);
}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(99,102,241,.2);border-radius:2px}

/* ── App shell ── */
#app{position:relative;z-index:1;display:flex;flex-direction:column;height:100dvh}

/* ── Nav ── */
#nav{
  height:48px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:0 18px;border-bottom:1px solid var(--bd);
  background:rgba(5,5,14,.9);backdrop-filter:blur(18px);
}
#nav-l{display:flex;align-items:center;gap:10px}
#back{
  font-size:11px;font-weight:600;color:var(--mu);text-decoration:none;
  padding:4px 10px;border:1px solid var(--bd);border-radius:7px;
  transition:color .15s,border-color .15s;
}
#back:hover{color:var(--tx);border-color:var(--bd2)}
.vsep{width:1px;height:14px;background:var(--bd)}
#nav-title{font-size:12.5px;font-weight:700;color:#a5b4fc}
#nav-r{display:flex;align-items:center;gap:10px}
#stats-pill{font-size:10.5px;color:var(--mu);background:var(--s1);
  padding:3px 11px;border-radius:20px;border:1px solid var(--bd)}
#auth-label{font-size:11px;color:#7577f4;font-weight:600}
#sb-toggle{
  display:none;background:none;border:1px solid var(--bd);
  color:var(--mu);border-radius:6px;padding:4px 8px;font-size:13px;cursor:pointer;
  transition:color .15s,border-color .15s;
}
#sb-toggle:hover{color:var(--tx);border-color:var(--bd2)}

/* ── Upload strip ── */
#upload-strip{
  padding:8px 16px;border-bottom:1px solid var(--bd);flex-shrink:0;
  display:flex;gap:7px;align-items:center;flex-wrap:wrap;
  background:rgba(5,5,14,.5);
}
#drop-zone{
  flex:1;min-width:180px;border:1.5px dashed rgba(99,102,241,.28);border-radius:9px;
  padding:8px 15px;display:flex;align-items:center;gap:9px;cursor:pointer;
  background:rgba(99,102,241,.018);
  transition:border-color .2s,background .2s;
}
#drop-zone:hover,#drop-zone.dg{border-color:rgba(99,102,241,.55);background:rgba(99,102,241,.04)}
#dz-txt{font-size:12px;color:var(--tx2)}
#dz-txt strong{color:#a5b4fc}
#dz-hint{font-size:10.5px;color:var(--mu);margin-left:auto;white-space:nowrap}
#scan-btn{
  flex-shrink:0;background:rgba(34,211,238,.065);border:1px solid rgba(34,211,238,.2);
  color:#67e8f9;border-radius:8px;padding:8px 13px;font-family:var(--font);
  font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;
  transition:background .2s,border-color .2s;
}
#scan-btn:hover{background:rgba(34,211,238,.12);border-color:rgba(34,211,238,.3)}
#sel-row{display:none;align-items:center;gap:7px;flex:1;min-width:220px}
.fchip{
  display:flex;align-items:center;gap:5px;background:rgba(99,102,241,.08);
  border:1px solid rgba(99,102,241,.2);border-radius:7px;padding:4px 9px;
  font-size:11.5px;white-space:nowrap;
}
.eb{font-size:8.5px;font-weight:800;padding:1px 5px;border-radius:3px;
  text-transform:uppercase;letter-spacing:.06em}
.eb-pdf{background:rgba(239,68,68,.16);color:#fca5a5}
.eb-docx,.eb-doc{background:rgba(59,130,246,.16);color:#93c5fd}
.eb-txt{background:rgba(34,197,94,.16);color:#86efac}
.eb-def{background:rgba(99,102,241,.16);color:#a5b4fc}
#mod-in{
  flex:1;min-width:0;background:rgba(255,255,255,.04);border:1px solid var(--bd);
  border-radius:7px;padding:5px 11px;color:var(--tx);font-family:var(--font);
  font-size:12px;outline:none;transition:border-color .18s;
}
#mod-in:focus{border-color:rgba(99,102,241,.42)}
#mod-in::placeholder{color:var(--mu)}
.ghost-btn{
  background:none;border:1px solid var(--bd);color:var(--mu);border-radius:7px;
  padding:5px 11px;font-family:var(--font);font-size:11.5px;cursor:pointer;flex-shrink:0;
  transition:color .15s,border-color .15s;
}
.ghost-btn:hover{color:var(--tx);border-color:var(--bd2)}
#feed-btn{
  background:var(--ind);border:none;color:#fff;border-radius:7px;padding:5px 15px;
  font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0;
  transition:background .2s,transform .15s;
}
#feed-btn:hover{background:var(--ind2)}
#feed-btn:active{transform:scale(.97)}
#feed-btn:disabled{opacity:.4;cursor:not-allowed}
/* inline upload status */
#upload-status{
  font-size:11.5px;font-weight:600;color:#4ade80;display:none;align-items:center;gap:6px;
  padding:4px 0;flex-shrink:0;
}
#upload-status.err{color:#f87171}

/* ── Body row (sidebar + map) ── */
#body-row{flex:1;display:flex;overflow:hidden;min-height:0}

/* ── Sidebar ── */
#sidebar{
  width:264px;flex-shrink:0;
  border-right:1px solid var(--bd);
  display:flex;flex-direction:column;
  background:rgba(5,5,14,.55);
  transition:transform .28s var(--ease2);
}
#tab-bar{
  display:flex;align-items:center;gap:2px;
  padding:8px 10px;border-bottom:1px solid var(--bd);flex-shrink:0;
}
.tab{
  flex:1;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;
  padding:5px 4px;border-radius:7px;border:none;background:none;color:var(--mu);
  cursor:pointer;font-family:var(--font);transition:color .15s,background .15s;
  white-space:nowrap;
}
.tab:hover{color:var(--tx2);background:rgba(255,255,255,.04)}
.tab.active{color:#a5b4fc;background:rgba(99,102,241,.1)}
#panel-items,#panel-queue,#panel-search{
  flex:1;overflow-y:auto;padding:8px;display:none;min-height:0;
}
#panel-items.vis,#panel-queue.vis,#panel-search.vis{display:block}

/* Queue panel */
#queue-hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:2px 4px 7px;
}
#queue-label{font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.09em;color:var(--mu)}
#queue-actions{display:flex;gap:5px}
.qact{
  font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:6px;cursor:pointer;
  border:1px solid;font-family:var(--font);transition:background .15s;
}
#q-run{background:rgba(99,102,241,.1);border-color:rgba(99,102,241,.25);color:#a5b4fc}
#q-run:hover{background:rgba(99,102,241,.2)}
#q-run:disabled{opacity:.35;cursor:not-allowed}
#q-clr{background:none;border-color:var(--bd);color:var(--mu)}
#q-clr:hover{color:var(--tx);border-color:var(--bd2)}
#queue-empty{text-align:center;color:var(--mu);font-size:12px;padding:24px 0;line-height:1.8}

/* Queue item */
.qi{
  background:var(--s1);border:1px solid var(--bd);border-radius:10px;
  padding:10px 11px;margin-bottom:6px;
  transition:border-color .15s;
}
.qi.running{border-color:rgba(99,102,241,.3)}
.qi.done-ok{border-color:rgba(74,222,128,.25)}
.qi.done-er{border-color:rgba(239,68,68,.25)}
.qi-top{display:flex;align-items:flex-start;gap:8px}
.qi-st{
  width:18px;height:18px;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-size:13px;margin-top:1px;
}
.qi-info{flex:1;min-width:0}
.qi-fname{font-size:12px;font-weight:600;color:var(--tx);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px}
.qi-mod-in{
  width:100%;background:rgba(255,255,255,.04);border:1px solid var(--bd);
  border-radius:5px;padding:3px 7px;color:var(--tx2);font-family:var(--font);
  font-size:10.5px;outline:none;transition:border-color .15s;
}
.qi-mod-in:focus{border-color:rgba(99,102,241,.4)}
/* inline progress steps */
.qi-steps{display:none;margin-top:8px;gap:4px;flex-direction:column}
.qi.running .qi-steps,.qi.done-ok .qi-steps,.qi.done-er .qi-steps{display:flex}
.qs{display:flex;align-items:center;gap:7px;font-size:11px}
.qs-i{width:14px;text-align:center;font-size:12px;flex-shrink:0}
.qs-l{color:var(--mu)}
.qs.done  .qs-i{color:#4ade80}.qs.done  .qs-l{color:rgba(226,226,240,.65)}
.qs.act   .qs-i{color:#a5b4fc}.qs.act   .qs-l{color:var(--tx);font-weight:600}
.qs.err   .qs-i{color:#f87171}.qs.err   .qs-l{color:#f87171}
.qs.pend  .qs-i{color:rgba(255,255,255,.1)}
.qi-result{margin-top:7px;font-size:11px;font-weight:600}
.qi.done-ok .qi-result{color:#4ade80}
.qi.done-er .qi-result{color:#f87171}

/* Items panel */
#items-hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:2px 4px 8px;gap:6px;flex-shrink:0;
}
#items-count{font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.09em;color:var(--mu)}
#items-actions{display:flex;gap:5px;align-items:center}
#sel-all-btn{
  font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:6px;cursor:pointer;
  border:1px solid var(--bd);background:none;color:var(--mu);
  font-family:var(--font);transition:color .15s,border-color .15s;white-space:nowrap;
}
#sel-all-btn:hover{color:var(--tx);border-color:var(--bd2)}
#del-sel-btn{
  font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:6px;cursor:pointer;
  border:1px solid rgba(239,68,68,.3);background:rgba(239,68,68,.08);color:#fca5a5;
  font-family:var(--font);transition:background .15s;white-space:nowrap;display:none;
}
#del-sel-btn:hover{background:rgba(239,68,68,.2)}
.icard{
  background:var(--s1);border:1px solid var(--bd);border-radius:9px;
  padding:9px 11px;margin-bottom:6px;transition:border-color .15s,background .15s;
  cursor:pointer;
}
.icard:hover{border-color:var(--bd2)}
.icard.sel{border-color:rgba(239,68,68,.45);background:rgba(239,68,68,.04)}
.icard-top{display:flex;align-items:flex-start;gap:7px;margin-bottom:4px}
.icb{
  width:15px;height:15px;border-radius:4px;border:1.5px solid var(--bd2);
  flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:800;color:transparent;
  background:transparent;transition:background .15s,border-color .15s,color .15s;
}
.icard.sel .icb{background:rgba(239,68,68,.75);border-color:rgba(239,68,68,.9);color:#fff}
.icard-name{font-size:12px;font-weight:600;color:var(--tx);flex:1;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.idel{background:none;border:none;color:rgba(239,68,68,.28);cursor:pointer;
  font-size:12px;padding:0 2px;transition:color .15s;flex-shrink:0}
.idel:hover{color:#f87171}
.imeta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.mp{font-size:10px;color:var(--mu);background:rgba(255,255,255,.028);
  padding:1px 6px;border-radius:4px}
.mp-c{color:#a5b4fc;background:rgba(99,102,241,.08)}

/* Search panel */
#sq-wrap{display:flex;gap:6px;padding:2px 0 8px}
#sq{
  flex:1;background:rgba(255,255,255,.04);border:1px solid var(--bd);border-radius:7px;
  padding:7px 10px;color:var(--tx);font-family:var(--font);font-size:12px;
  outline:none;transition:border-color .18s;
}
#sq:focus{border-color:rgba(99,102,241,.42)}
#sq::placeholder{color:var(--mu)}
#sq-go{
  background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.25);
  color:#a5b4fc;border-radius:7px;padding:7px 12px;font-family:var(--font);
  font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0;
  transition:background .18s;
}
#sq-go:hover{background:rgba(99,102,241,.22)}
#sq-go:disabled{opacity:.35;cursor:not-allowed}
.rcard{background:var(--s1);border:1px solid var(--bd);border-radius:9px;
  padding:10px 11px;margin-bottom:7px}
.rtop{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.rsrc{font-size:11px;font-weight:700;color:#a5b4fc;flex:1;min-width:0;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rscr{font-size:10px;padding:1px 7px;border-radius:4px;
  background:rgba(255,255,255,.036);flex-shrink:0;margin-left:6px}
.rhi{color:#4ade80}.rmd{color:#fbbf24}.rlo{color:var(--mu)}
.rtxt{font-size:11.5px;color:var(--tx2);line-height:1.55;max-height:72px;
  overflow:hidden;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical}
.rmeta{font-size:10px;color:var(--mu);margin-top:4px}
.empty-st{text-align:center;color:var(--mu);font-size:12px;padding:20px 0;line-height:1.8}

/* ── Map area ── */
#map-wrap{
  flex:1;overflow:hidden;position:relative;
  background:transparent;cursor:grab;user-select:none;touch-action:none;
}
#map-controls{
  position:absolute;top:10px;right:12px;z-index:10;
  display:flex;gap:5px;
}
.mctl{
  background:rgba(5,5,14,.75);border:1px solid var(--bd);
  color:var(--mu);border-radius:7px;padding:4px 9px;font-size:11px;
  cursor:pointer;font-family:var(--font);font-weight:600;
  transition:color .15s,border-color .15s;backdrop-filter:blur(8px);
}
.mctl:hover{color:var(--tx);border-color:var(--bd2)}
#map-empty{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  text-align:center;color:var(--mu);font-size:13px;line-height:2.5;display:none;
  pointer-events:none;
}
#mm-svg{display:block;width:100%;height:100%}
.mctl-sep{width:1px;height:14px;background:rgba(255,255,255,.1);display:inline-block;margin:0 2px;vertical-align:middle}

/* ── Responsive ── */
@media(max-width:768px){
  #sidebar{
    position:absolute;left:0;top:0;height:100%;z-index:50;
    transform:translateX(-100%);
    box-shadow:4px 0 30px rgba(0,0,0,.5);
  }
  #sidebar.open{transform:translateX(0)}
  #sb-toggle{display:flex}
  #dz-hint{display:none}
}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin .75s linear infinite}
</style>
</head>
<body>
<input type="file" id="fi" accept=".pdf,.docx,.doc,.txt" style="display:none">

<div id="app">
  <nav id="nav">
    <div id="nav-l">
      <button id="sb-toggle" onclick="toggleSidebar()">☰</button>
      <a href="/ui" id="back">← Chat</a>
      <div class="vsep"></div>
      <span id="nav-title">Knowledge</span>
    </div>
    <div id="nav-r">
      <span id="stats-pill">loading…</span>
      <span id="auth-label"></span>
    </div>
  </nav>

  <div id="upload-strip">
    <div id="drop-zone"
         onclick="openPicker()"
         ondragover="event.preventDefault();this.classList.add('dg')"
         ondragleave="this.classList.remove('dg')"
         ondrop="handleDrop(event)">
      <span style="font-size:17px">📄</span>
      <span id="dz-txt">Drop a file or <strong>click to choose</strong></span>
      <span id="dz-hint">PDF · Word · TXT</span>
    </div>
    <button id="scan-btn" onclick="scanFolder()">📂 Scan Folder</button>
    <div id="sel-row">
      <div class="fchip" id="fchip"></div>
      <input type="text" id="mod-in" placeholder="Module / path  (e.g. CIT210/Week 1)"/>
      <button class="ghost-btn" onclick="cancelPick()">✕</button>
      <button id="feed-btn" onclick="startFeed()">Feed →</button>
    </div>
    <div id="upload-status"></div>
  </div>

  <div id="body-row">
    <!-- Sidebar -->
    <div id="sidebar">
      <div id="tab-bar">
        <button class="tab active" data-panel="items" onclick="switchTab('items')">Items</button>
        <button class="tab" data-panel="queue" onclick="switchTab('queue')">Queue</button>
        <button class="tab" data-panel="search" onclick="switchTab('search')">Search</button>
      </div>

      <!-- Items panel -->
      <div id="panel-items" class="vis">
        <div id="items-hd">
          <span id="items-count">0 items</span>
          <div id="items-actions">
            <button id="del-sel-btn" onclick="delSelected()">Delete (0)</button>
            <button id="sel-all-btn" onclick="toggleSelectAll()">Select All</button>
          </div>
        </div>
        <div id="items-body"><div class="empty-st">No items yet.</div></div>
      </div>

      <!-- Queue panel -->
      <div id="panel-queue">
        <div id="queue-hd">
          <span id="queue-label">0 files</span>
          <div id="queue-actions">
            <button class="qact" id="q-run" onclick="startBatch()">▶ Feed All</button>
            <button class="qact" id="q-clr" onclick="clearQueue()">Clear</button>
          </div>
        </div>
        <div id="queue-empty">No files in queue.<br>Use "Scan Folder" to add files.</div>
        <div id="queue-rows"></div>
      </div>

      <!-- Search panel -->
      <div id="panel-search">
        <div id="sq-wrap">
          <input type="text" id="sq" placeholder="Ask anything to test retrieval…"
                 onkeydown="if(event.key==='Enter')doSearch()"/>
          <button id="sq-go" onclick="doSearch()">Go</button>
        </div>
        <div id="sq-res"><div class="empty-st">Type a query to test retrieval.</div></div>
      </div>
    </div><!-- /sidebar -->

    <!-- Mind-map -->
    <div id="map-wrap">
      <div id="map-controls">
        <button class="mctl" onclick="zoomIn()" title="Zoom in">+</button>
        <button class="mctl" onclick="zoomOut()" title="Zoom out">−</button>
        <button class="mctl" onclick="fitScreen()" title="Fit to screen">⊞ Fit</button>
        <span class="mctl-sep"></span>
        <button class="mctl" onclick="expandAll()">Expand All</button>
        <button class="mctl" onclick="collapseAll()">Collapse</button>
        <button class="mctl" onclick="loadTree()" title="Refresh">⟳</button>
      </div>
      <div id="map-empty">No knowledge yet.<br>Upload a file to build the map.</div>
      <svg id="mm-svg" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
  </div>
</div>

<script>
// ─── Constants & state ────────────────────────────────────────────────────────
const API = 'http://127.0.0.1:8000';
const TOK = localStorage.getItem('koottam_token');

let _selFile  = null;
let _queue    = [];
let _batching = false;
let _treeData = null; // last rendered tree items
const COL     = new Set(); // collapsed node keys
const HITS    = new Set(); // search-highlighted node keys

const FONT = 'Outfit,sans-serif';
// Mind-map layout
const LW = 205, NH = 42, NG = 10, PAD_X = 44, PAD_Y = 36, BR = 9;
const NW = d => [168,152,144,136][Math.min(d,3)];

const MCLR = [
  {bg:'rgba(99,102,241,.14)', bd:'rgba(99,102,241,.42)', tx:'#c4b5fd', ln:'rgba(99,102,241,.22)'},
  {bg:'rgba(245,158,11,.1)',  bd:'rgba(245,158,11,.36)', tx:'#fcd34d', ln:'rgba(245,158,11,.18)'},
  {bg:'rgba(20,184,166,.1)',  bd:'rgba(20,184,166,.36)', tx:'#5eead4', ln:'rgba(20,184,166,.18)'},
  {bg:'rgba(244,63,94,.1)',   bd:'rgba(244,63,94,.36)',  tx:'#fda4af', ln:'rgba(244,63,94,.18)'},
  {bg:'rgba(139,92,246,.12)', bd:'rgba(139,92,246,.4)',  tx:'#ddd6fe', ln:'rgba(139,92,246,.2)'},
];
const FDOT = {pdf:'rgba(252,165,165,.65)',docx:'rgba(147,197,253,.65)',doc:'rgba(147,197,253,.65)',txt:'rgba(134,239,172,.65)'};
const STEP_LABELS = {reading:'Reading',chunking:'Chunking',storing:'Storing'};
const STEP_ORDER  = ['reading','chunking','storing'];

let _panning=false,_didPan=false;

// ─── Helpers ──────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
function xm(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function xa(s){ return xm(s).replace(/"/g,'&quot;'); }
function fext(n){ return n.includes('.')?n.split('.').pop().toLowerCase():'txt'; }
function febc(e){ return {pdf:'eb-pdf',docx:'eb-docx',doc:'eb-doc',txt:'eb-txt'}[e]||'eb-def'; }
function mclrIdx(name){ let h=0;for(const c of name)h=(h*31+c.charCodeAt(0))&0xffff;return h%MCLR.length; }

async function api(path,opts={}){
  return fetch(API+path,{...opts,headers:{...(TOK?{Authorization:`Bearer ${TOK}`}:{}), ...(opts.headers||{})}});
}

// ─── Build tree data structure ────────────────────────────────────────────────
// name field may contain '/' for hierarchy: "CIT210/Week1"
function buildTree(items){
  nodeMap.clear();
  const root={key:'__root__',name:'',type:'folder',children:[],_k:0,_f:0,modIdx:-1,depth:0};
  nodeMap.set(root.key,root);
  const folderIndex=new Map([['',root]]);

  function getFolder(path){
    if(folderIndex.has(path))return folderIndex.get(path);
    const parts=path.split('/');
    const name=parts[parts.length-1];
    const parentPath=parts.slice(0,-1).join('/');
    const parent=getFolder(parentPath);
    const node={key:path,name,type:'folder',children:[],_k:0,_f:0,modIdx:-1,depth:0};
    parent.children.push(node);
    folderIndex.set(path,node);
    nodeMap.set(node.key,node);
    return node;
  }

  items.forEach(it=>{
    const parts=it.name.split('/').map(s=>s.trim()).filter(Boolean);
    const folderPath=parts.join('/');
    const folder=getFolder(folderPath);
    const fileNode={
      key:'file:'+it.id, type:'file',
      id:it.id, name:it.name, filename:it.filename,
      file_type:it.file_type||'txt', chunk_count:it.chunk_count||0,
      children:[], _k:it.chunk_count||0, _f:1, modIdx:-1, depth:0,
    };
    folder.children.push(fileNode);
    nodeMap.set(fileNode.key,fileNode);
  });

  // Assign module indices (top-level children get distinct colors)
  root.children.forEach((c,i)=>{
    const mi=c.type==='folder'?i%MCLR.length:mclrIdx(c.name);
    function assignMI(n,mi){n.modIdx=mi;n.children.forEach(c2=>assignMI(c2,mi));}
    assignMI(c,mi);
  });

  // Compute totals
  function calc(n){
    if(n.type==='file'){n._k=n.chunk_count;n._f=1;return;}
    n.children.forEach(c=>calc(c));
    n._k=n.children.reduce((s,c)=>s+c._k,0);
    n._f=n.children.reduce((s,c)=>s+c._f,0);
  }
  calc(root);
  return root;
}

// ─── Mind-map layout (horizontal left-to-right tree) ─────────────────────────
function visKids(node){ return COL.has(node.key)?[]:node.children||[]; }

function layout(root){
  let leafY=PAD_Y+NH/2;
  function setDepth(n,d){n.depth=d;n.children.forEach(c=>setDepth(c,d+1));}
  function setX(n,x){n.x=x;visKids(n).forEach(c=>setX(c,x+LW));}
  function setY(n){
    const kids=visKids(n);
    if(!kids.length){n.y=leafY;leafY+=NH+NG;return;}
    kids.forEach(c=>setY(c));
    n.y=(kids[0].y+kids[kids.length-1].y)/2;
  }
  setDepth(root,0);
  setX(root,PAD_X);
  setY(root);
  return leafY-NG/2+PAD_Y;
}

function getMaxX(n){
  const w=NW(n.depth||0);
  const kids=visKids(n);
  return kids.length?Math.max(n.x+w,...kids.map(getMaxX)):n.x+w;
}

// ─── Mind-map SVG rendering ───────────────────────────────────────────────────
function edgesOf(node){
  let h='';
  const kids=visKids(node);
  if(!kids.length)return h;
  const nw=NW(node.depth||0);
  const rx=node.x+nw, ry=node.y;
  kids.forEach(c=>{
    const lx=c.x, ly=c.y;
    const mx=(rx+lx)/2;
    const clr=c.modIdx>=0?MCLR[c.modIdx].ln:'rgba(99,102,241,.18)';
    h+=`<path d="M${rx} ${ry}C${mx} ${ry} ${mx} ${ly} ${lx} ${ly}" fill="none" stroke="${clr}" stroke-width="1.5"/>`;
    h+=edgesOf(c);
  });
  return h;
}

function nodeEl(node){
  const d=node.depth||0, nw=NW(d);
  const x=node.x, y=node.y, ny=y-NH/2;
  const isRoot=node.key==='__root__', isFile=node.type==='file';
  const hasC=node.children&&node.children.length>0;
  const isCol=COL.has(node.key), isHit=HITS.has(node.key);

  // Colors
  let bg,bd,tx;
  if(isRoot){bg='rgba(99,102,241,.18)';bd='rgba(99,102,241,.5)';tx='#c4b5fd';}
  else if(isFile){
    bg='rgba(255,255,255,.022)';bd='rgba(255,255,255,.07)';tx='rgba(226,226,240,.6)';
  } else {
    const mc=MCLR[node.modIdx>=0?node.modIdx:0];
    if(d===1){bg=mc.bg;bd=mc.bd;tx=mc.tx;}
    else{bg='rgba(255,255,255,.034)';bd='rgba(255,255,255,.08)';tx=MCLR[node.modIdx>=0?node.modIdx:0].tx;}
  }
  if(isHit){bg='rgba(99,102,241,.22)';bd='rgba(99,102,241,.6)';}

  // Label truncation (rough char limit based on pixel width)
  const maxCh=Math.floor((nw-(isFile?44:22))/7.2);
  const raw=isFile?node.filename:node.name;
  const lbl=xm(raw.length>maxCh?raw.slice(0,maxCh-1)+'…':raw);

  const extra=isFile?`data-id="${xa(node.id)}" data-fname="${xa(node.filename)}" data-nmod="${xa(node.name)}"`:
    (hasC?'':' data-leaf="1"');

  let g=`<g data-key="${xa(node.key)}" data-type="${node.type}"${extra} style="cursor:${(hasC||isRoot)?'pointer':'default'}">`;
  g+=`<rect x="${x}" y="${ny}" width="${nw}" height="${NH}" rx="${BR}" fill="${bg}" stroke="${bd}" stroke-width="1.5"/>`;

  if(isRoot){
    // Root: centered icon + text
    g+=`<text x="${x+nw/2}" y="${y-3}" text-anchor="middle" fill="${tx}" font-family="${FONT}" font-size="13.5" font-weight="800">⬡ Knowledge</text>`;
    if(node._k>0)g+=`<text x="${x+nw/2}" y="${y+12}" text-anchor="middle" fill="rgba(226,226,240,.3)" font-family="${FONT}" font-size="9.5">${node._f} files · ${node._k.toLocaleString()} chunks</text>`;
  } else if(isFile){
    const dotClr=FDOT[node.file_type]||'rgba(255,255,255,.3)';
    g+=`<circle cx="${x+13}" cy="${y}" r="3.5" fill="${dotClr}"/>`;
    g+=`<text x="${x+24}" y="${y+4}" fill="${tx}" font-family="${FONT}" font-size="11">${lbl}</text>`;
    if(node.chunk_count>0)g+=`<text x="${x+nw-8}" y="${y-4}" text-anchor="end" fill="rgba(226,226,240,.22)" font-family="${FONT}" font-size="9">${node.chunk_count} ch</text>`;
  } else {
    g+=`<text x="${x+12}" y="${y-3}" fill="${tx}" font-family="${FONT}" font-size="${d===1?12.5:11.5}" font-weight="${d===1?700:600}">${lbl}</text>`;
    const badge=node._k>0?`${node._k.toLocaleString()} chunks · ${node._f} file${node._f!==1?'s':''}`:'';
    if(badge)g+=`<text x="${x+12}" y="${y+11}" fill="rgba(226,226,240,.28)" font-family="${FONT}" font-size="9.5">${badge}</text>`;
    if(hasC){
      const ec=isCol?'rgba(226,226,240,.35)':'rgba(226,226,240,.22)';
      g+=`<circle cx="${x+nw-14}" cy="${y}" r="8" fill="rgba(255,255,255,.04)" stroke="${ec}" stroke-width="1"/>`;
      g+=`<text x="${x+nw-14}" y="${y+4}" text-anchor="middle" fill="${ec}" font-family="${FONT}" font-size="8">${isCol?'▶':'▾'}</text>`;
    }
  }

  g+='</g>';
  visKids(node).forEach(c=>{g+=nodeEl(c);});
  return g;
}

function renderMindMap(items){
  const svg=$('mm-svg'), em=$('map-empty');
  if(!items||!items.length){
    svg.style.display='none';em.style.display='block';return;
  }
  em.style.display='none';svg.style.display='block';

  const root=buildTree(items);
  _contentH=layout(root);
  _contentW=getMaxX(root)+PAD_X;

  svg.removeAttribute('viewBox');
  svg.setAttribute('width','100%');
  svg.setAttribute('height','100%');
  svg.innerHTML=`<g id="mm-g" transform="translate(${_tx},${_ty}) scale(${_scale})">${edgesOf(root)}${nodeEl(root)}</g>`;

  if(_fitNext){_fitNext=false;fitScreen(false);}
}

// ─── Mind-map interaction (event delegation) ──────────────────────────────────
$('map-wrap').addEventListener('click',e=>{
  if(_didPan){_didPan=false;return;}
  const g=e.target.closest('[data-key]');if(!g)return;
  const key=g.dataset.key, type=g.dataset.type;
  if(type==='folder'){
    const nd=nodeMap.get(key);
    if(nd&&nd.children.length>0){
      COL.has(key)?COL.delete(key):COL.add(key);
      renderMindMap(_treeData);
    }
  }
});

function expandAll(){ COL.clear(); if(_treeData)renderMindMap(_treeData); }
function collapseAll(){
  nodeMap.forEach((n,k)=>{if(n.type==='folder'&&k!=='__root__'&&n.children.length)COL.add(k);});
  if(_treeData)renderMindMap(_treeData);
}

// ─── Pan / zoom functions ──────────────────────────────────────────────────────
const _mw=$('map-wrap');

function applyTransform(){
  const g=document.getElementById('mm-g');
  if(g)g.setAttribute('transform',`translate(${_tx},${_ty}) scale(${_scale})`);
}

function animateTo(tx,ty,scale,dur=260){
  const sx=_tx,sy=_ty,ss=_scale,t0=performance.now();
  function step(now){
    const p=Math.min(1,(now-t0)/dur);
    const e=1-Math.pow(1-p,3); // ease-out cubic
    _tx=sx+(tx-sx)*e;_ty=sy+(ty-sy)*e;_scale=ss+(scale-ss)*e;
    applyTransform();
    if(p<1)requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function fitScreen(animate=true){
  const ww=_mw.clientWidth||800,wh=_mw.clientHeight||500;
  const sx=(ww-60)/_contentW,sy=(wh-60)/_contentH;
  const ns=Math.min(sx,sy,1.4);
  const nx=(ww-_contentW*ns)/2,ny=Math.max(20,(wh-_contentH*ns)/2);
  if(animate)animateTo(nx,ny,ns);else{_tx=nx;_ty=ny;_scale=ns;applyTransform();}
}

function _zoomCenter(factor){
  const cx=_mw.clientWidth/2,cy=_mw.clientHeight/2;
  const ns=Math.max(0.1,Math.min(4,_scale*factor));
  return{tx:cx-(cx-_tx)*(ns/_scale),ty:cy-(cy-_ty)*(ns/_scale),scale:ns};
}
function zoomIn(){const z=_zoomCenter(1.3);animateTo(z.tx,z.ty,z.scale);}
function zoomOut(){const z=_zoomCenter(1/1.3);animateTo(z.tx,z.ty,z.scale);}

// Wheel zoom — instant, cursor-centered
_mw.addEventListener('wheel',e=>{
  e.preventDefault();
  const rect=_mw.getBoundingClientRect();
  const cx=e.clientX-rect.left,cy=e.clientY-rect.top;
  const factor=e.deltaY<0?1.12:1/1.12;
  const ns=Math.max(0.1,Math.min(4,_scale*factor));
  _tx=cx-(cx-_tx)*(ns/_scale);
  _ty=cy-(cy-_ty)*(ns/_scale);
  _scale=ns;
  applyTransform();
},{passive:false});

// Mouse pan — skip when pointer is on a node
_mw.addEventListener('mousedown',e=>{
  if(e.target.closest('[data-key]')||e.button!==0)return;
  _panning=true;_didPan=false;
  _panSX=e.clientX;_panSY=e.clientY;_panOX=_tx;_panOY=_ty;
  e.preventDefault();
});
window.addEventListener('mousemove',e=>{
  if(!_panning)return;
  const dx=e.clientX-_panSX,dy=e.clientY-_panSY;
  if(Math.abs(dx)>2||Math.abs(dy)>2)_didPan=true;
  _tx=_panOX+dx;_ty=_panOY+dy;
  applyTransform();
  _mw.style.cursor='grabbing';
});
window.addEventListener('mouseup',()=>{
  if(_panning){_panning=false;_mw.style.cursor='grab';}
});

// Touch: 1-finger pan, 2-finger pinch-zoom
_mw.addEventListener('touchstart',e=>{
  if(e.touches.length===1){
    _panning=true;_didPan=false;
    _panSX=e.touches[0].clientX;_panSY=e.touches[0].clientY;_panOX=_tx;_panOY=_ty;
  }else if(e.touches.length===2){
    _panning=false;
    _td=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY);
    _tc={x:(e.touches[0].clientX+e.touches[1].clientX)/2,y:(e.touches[0].clientY+e.touches[1].clientY)/2};
  }
},{passive:true});
_mw.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&_panning){
    const dx=e.touches[0].clientX-_panSX,dy=e.touches[0].clientY-_panSY;
    if(Math.abs(dx)>2||Math.abs(dy)>2)_didPan=true;
    _tx=_panOX+dx;_ty=_panOY+dy;
    applyTransform();
  }else if(e.touches.length===2){
    const d=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY);
    const rect=_mw.getBoundingClientRect();
    const cx=(e.touches[0].clientX+e.touches[1].clientX)/2-rect.left;
    const cy=(e.touches[0].clientY+e.touches[1].clientY)/2-rect.top;
    const ns=Math.max(0.1,Math.min(4,_scale*(d/(_td||1))));
    _tx=cx-(cx-_tx)*(ns/_scale);_ty=cy-(cy-_ty)*(ns/_scale);_scale=ns;_td=d;
    applyTransform();
  }
},{passive:false});
_mw.addEventListener('touchend',()=>{_panning=false;});

// Highlight nodes matching search results
function highlightSearch(results){
  HITS.clear();
  results.forEach(r=>{
    nodeMap.forEach((n,k)=>{
      if(n.type==='file'&&n.name===r.source_name&&n.filename===r.source_file){
        HITS.add(k);
        // expand ancestor folders
        let cur=k.startsWith('file:')?n.name:''; // module path
        const parts=cur.split('/').filter(Boolean);
        for(let i=parts.length;i>=1;i--){
          const fk=parts.slice(0,i).join('/');
          COL.delete(fk);
        }
      }
    });
  });
  if(_treeData)renderMindMap(_treeData);
}

// ─── Items list ────────────────────────────────────────────────────────────────
let _selItems=new Set(), _allItems=[];

function updateItemsHd(){
  const n=_selItems.size, total=_allItems.length;
  $('items-count').textContent=`${total} item${total!==1?'s':''}${n?' · '+n+' selected':''}`;
  const db=$('del-sel-btn'), sb=$('sel-all-btn');
  db.style.display=n?'':'none';
  db.textContent=`Delete (${n})`;
  sb.textContent=(n===total&&total>0)?'Deselect All':'Select All';
}

$('items-body').addEventListener('click',e=>{
  // ✕ quick-delete a single item
  const d=e.target.closest('.idel');
  if(d){e.stopPropagation();delItem(d.dataset.id,d.dataset.name);return;}
  // Click anywhere else on the card → toggle selection
  const card=e.target.closest('.icard[data-id]');
  if(!card)return;
  const id=card.dataset.id;
  _selItems.has(id)?_selItems.delete(id):_selItems.add(id);
  card.classList.toggle('sel',_selItems.has(id));
  updateItemsHd();
});

function renderItems(items){
  _allItems=items;
  _selItems.clear();
  updateItemsHd();
  const el=$('items-body');
  if(!items.length){el.innerHTML='<div class="empty-st">No items yet.</div>';return;}
  el.innerHTML=items.map(it=>{
    const e=(it.file_type||'txt').toLowerCase();
    const fn=it.filename.length>22?it.filename.slice(0,22)+'…':it.filename;
    const dt=new Date(it.created_at).toLocaleDateString(undefined,{month:'short',day:'numeric'});
    return `<div class="icard" data-id="${xa(it.id)}" data-name="${xa(it.name)}">
      <div class="icard-top">
        <div class="icb">✓</div>
        <span class="icard-name" title="${xa(it.name)}">${xm(it.name)}</span>
        <button class="idel" data-id="${xa(it.id)}" data-name="${xa(it.name)}" title="Quick delete">✕</button>
      </div>
      <div class="imeta">
        <span class="mp mp-c">${it.chunk_count} chunks</span>
        <span class="mp"><span class="eb ${febc(e)}">${e}</span></span>
        <span class="mp" title="${xa(it.filename)}">${xm(fn)}</span>
        <span class="mp">${dt}</span>
      </div>
    </div>`;
  }).join('');
}

function toggleSelectAll(){
  if(_selItems.size===_allItems.length&&_allItems.length>0){
    _selItems.clear();
    document.querySelectorAll('.icard[data-id]').forEach(c=>c.classList.remove('sel'));
  }else{
    _allItems.forEach(it=>_selItems.add(String(it.id)));
    document.querySelectorAll('.icard[data-id]').forEach(c=>c.classList.add('sel'));
  }
  updateItemsHd();
}

async function delSelected(){
  const n=_selItems.size;if(!n)return;
  if(!confirm(`Delete ${n} item${n!==1?'s':''} from the knowledge base? This cannot be undone.`))return;
  const ids=[..._selItems];
  let failed=0;
  await Promise.all(ids.map(async id=>{
    try{
      const r=await api(`/knowledge/${id}`,{method:'DELETE'});
      if(!r.ok)failed++;
    }catch{failed++;}
  }));
  if(failed)alert(`${failed} item${failed!==1?'s':''} failed to delete.`);
  loadAll();
}

async function delItem(id,name){
  if(!confirm(`Delete "${name}"?`))return;
  try{
    const r=await api(`/knowledge/${id}`,{method:'DELETE'});
    if(!r.ok){const d=await r.json();alert(d.detail||'Delete failed');return;}
    loadAll();
  }catch{alert('Connection error');}
}

// ─── Single file upload ────────────────────────────────────────────────────────
const $fi=$('fi'),$dz=$('drop-zone'),$sr=$('sel-row');
const $chip=$('fchip'),$mi=$('mod-in'),$fb=$('feed-btn');
const $us=$('upload-status');

function openPicker(){$fi.click();}
$fi.addEventListener('change',()=>{if($fi.files[0])pickFile($fi.files[0]);});
function handleDrop(e){
  e.preventDefault();$dz.classList.remove('dg');
  if(e.dataTransfer.files[0])pickFile(e.dataTransfer.files[0]);
}

function pickFile(file){
  _selFile=file;
  const e=fext(file.name);
  const fn=file.name.length>26?file.name.slice(0,26)+'…':file.name;
  $chip.innerHTML=`<span class="eb ${febc(e)}">${e}</span> ${xm(fn)}`;
  $mi.value=file.name.replace(/\.[^.]+$/,'').replace(/[-_]+/g,' ').trim();
  $dz.style.display='none';$sr.style.display='flex';$us.style.display='none';
  setTimeout(()=>{$mi.focus();$mi.select();},50);
}

function cancelPick(){
  _selFile=null;$fi.value='';
  $dz.style.display='flex';$sr.style.display='none';$us.style.display='none';
}

async function startFeed(){
  const name=$mi.value.trim();
  if(!name||!_selFile)return;
  const file=_selFile;
  $fb.disabled=true;$fb.textContent='Starting…';
  const fd=new FormData();fd.append('file',file);fd.append('name',name);
  try{
    const r=await api('/knowledge/upload',{method:'POST',body:fd});
    const d=await r.json();
    if(!r.ok){alert(d.detail||'Upload failed');return;}
    cancelPick();
    // Poll inline
    $us.className='';$us.style.display='flex';$us.textContent='⟳ Processing…';
    pollSingle(d.job_id);
  }catch(e){alert('Upload error: '+e.message);}
  finally{$fb.disabled=false;$fb.textContent='Feed →';}
}

async function pollSingle(jid){
  try{
    const r=await api(`/knowledge/job/${jid}`);if(!r.ok)return;
    const job=await r.json();
    if(job.status==='running'){
      $us.textContent=`⟳ ${({reading:'Reading file',chunking:'Chunking text',storing:'Storing vectors'})[job.step]||job.step||'Processing'}…`;
      setTimeout(()=>pollSingle(jid),420);
    } else if(job.status==='done'){
      $us.className='';$us.textContent=`✓ Done — ${job.chunk_count} chunks stored`;
      loadAll();
      setTimeout(()=>{$us.style.display='none';},3500);
    } else {
      $us.className='err';$us.textContent=`✕ ${job.error||'Unknown error'}`;
    }
  }catch{}
}

// ─── Recursive folder scan ────────────────────────────────────────────────────
async function collectFiles(dirHandle,rootName,relPath='',out=[]){
  for await(const [name,handle] of dirHandle.entries()){
    if(handle.kind==='file'){
      const e=fext(name);
      if(['pdf','docx','doc','txt'].includes(e)){
        const mod=relPath?rootName+'/'+relPath:rootName;
        out.push({handle,filename:name,module:mod,st:'pending',msg:'',steps:[],result:''});
      }
    } else if(handle.kind==='directory'){
      await collectFiles(handle,rootName,relPath?relPath+'/'+name:name,out);
    }
  }
  return out;
}

async function scanFolder(){
  if(!window.showDirectoryPicker){alert('Requires Chrome or Edge.');return;}
  try{
    const dir=await window.showDirectoryPicker({mode:'read'});
    const files=await collectFiles(dir,dir.name);
    if(!files.length){alert('No supported files found.');return;}
    _queue=files;
    renderQueue();
    switchTab('queue');
  }catch(e){if(e.name!=='AbortError')alert('Scan error: '+e.message);}
}

// ─── Queue rendering ──────────────────────────────────────────────────────────
function renderQueue(){
  $('queue-label').textContent=`${_queue.length} file${_queue.length!==1?'s':''}`;
  $('queue-empty').style.display=_queue.length?'none':'block';
  $('queue-rows').innerHTML=_queue.map((item,i)=>`
    <div class="qi" id="qi-${i}">
      <div class="qi-top">
        <div class="qi-st" id="qst-${i}">${_icon(item.st)}</div>
        <div class="qi-info">
          <div class="qi-fname">${xm(item.filename.length>28?item.filename.slice(0,28)+'…':item.filename)}</div>
          <input class="qi-mod-in" value="${xa(item.module)}" placeholder="Module path"
                 onchange="_queue[${i}].module=this.value"/>
        </div>
      </div>
      <div class="qi-steps" id="qsteps-${i}"></div>
      <div class="qi-result" id="qres-${i}"></div>
    </div>`).join('');
}

function _icon(st){
  if(st==='done')    return '<span style="color:#4ade80;font-size:14px">✓</span>';
  if(st==='error')   return '<span style="color:#f87171;font-size:14px">✕</span>';
  if(st==='running') return '<span class="spin" style="color:#a5b4fc;font-size:13px">⟳</span>';
  return '<span style="color:var(--mu);font-size:14px">·</span>';
}

function updateQueueRow(i, job){
  const item=_queue[i];
  const el=$('qi-'+i);if(!el)return;
  // Update status icon
  const stEl=$('qst-'+i);if(stEl)stEl.innerHTML=_icon(item.st);

  // Update class on card
  el.className='qi'+
    (item.st==='running'?' running':'')+
    (item.st==='done'?' done-ok':'')+
    (item.st==='error'?' done-er':'');

  // Update steps
  const stepsEl=$('qsteps-'+i);
  if(stepsEl&&job){
    const steps=job.steps||[], active=job.step;
    const isDone=job.status==='done', isErr=job.status==='error';
    stepsEl.innerHTML=STEP_ORDER.map(key=>{
      const f=steps.find(s=>s.label===key);
      let cls,icon;
      if(f&&f.error){cls='err';icon='✕';}
      else if(f&&f.done){cls='done';icon='✓';}
      else if((active===key||f)&&!isDone&&!isErr){cls='act';icon='<span class="spin">⟳</span>';}
      else{cls='pend';icon='·';}
      return `<div class="qs ${cls}"><span class="qs-i">${icon}</span><span class="qs-l">${STEP_LABELS[key]||key}</span></div>`;
    }).join('');
  }

  // Update result
  const resEl=$('qres-'+i);
  if(resEl){
    if(item.st==='done')resEl.textContent=item.result;
    else if(item.st==='error')resEl.textContent=item.result;
  }
}

function clearQueue(){
  if(_batching&&!confirm('Stop batch?'))return;
  _batching=false;_queue=[];renderQueue();
}

// ─── Batch feed with inline queue progress ────────────────────────────────────
async function startBatch(){
  if(_batching||!_queue.length)return;
  _batching=true;$('q-run').disabled=true;

  for(let i=0;i<_queue.length;i++){
    if(!_batching)break;
    const item=_queue[i];
    if(item.st==='done')continue;

    item.st='running';item.result='';item.steps=[];
    updateQueueRow(i,null);

    let fileObj;
    try{fileObj=await item.handle.getFile();}
    catch(e){item.st='error';item.result='Cannot read file';updateQueueRow(i,null);continue;}

    const mod=item.module.trim()||item.filename.replace(/\.[^.]+$/,'');
    const fd=new FormData();fd.append('file',fileObj);fd.append('name',mod);

    let jid;
    try{
      const r=await api('/knowledge/upload',{method:'POST',body:fd});
      const d=await r.json();
      if(!r.ok)throw new Error(d.detail||'Upload failed');
      jid=d.job_id;
    }catch(e){item.st='error';item.result=String(e.message||e);updateQueueRow(i,null);continue;}

    // Poll job until done, updating row inline
    await new Promise(resolve=>{
      function poll(){
        api(`/knowledge/job/${jid}`).then(r=>r.json()).then(job=>{
          updateQueueRow(i,job);
          if(job.status==='running'){setTimeout(poll,420);}
          else if(job.status==='done'){
            item.st='done';item.result=`✓ ${job.chunk_count} chunks stored`;
            updateQueueRow(i,job);resolve();
          } else {
            item.st='error';item.result=`✕ ${job.error||'Failed'}`;
            updateQueueRow(i,job);resolve();
          }
        }).catch(()=>{item.st='error';item.result='Poll error';updateQueueRow(i,null);resolve();});
      }
      poll();
    });

    loadAll();
  }

  _batching=false;$('q-run').disabled=false;
}

// ─── Search ───────────────────────────────────────────────────────────────────
async function doSearch(){
  const q=$('sq').value.trim();if(!q)return;
  const go=$('sq-go'),res=$('sq-res');
  go.disabled=true;res.innerHTML='<div class="empty-st">Searching…</div>';
  try{
    const r=await api('/knowledge/search',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({query:q,n:3}),
    });
    const d=await r.json();
    if(!r.ok){res.innerHTML=`<div class="empty-st" style="color:#f87171">${xm(d.detail||'Error')}</div>`;return;}
    if(!d.results.length){res.innerHTML='<div class="empty-st">No results found.</div>';return;}
    res.innerHTML=d.results.map(h=>{
      const pct=Math.round(h.score*100);
      const sc=pct>=70?'rhi':pct>=40?'rmd':'rlo';
      const txt=h.text.length>250?h.text.slice(0,250)+'…':h.text;
      return `<div class="rcard">
        <div class="rtop">
          <span class="rsrc">📄 ${xm(h.source_name)}</span>
          <span class="rscr ${sc}">${pct}%</span>
        </div>
        <div class="rtxt">${xm(txt)}</div>
        <div class="rmeta">chunk ${h.chunk_index+1} · ${xm(h.source_file)}</div>
      </div>`;
    }).join('');
    highlightSearch(d.results);
  }catch(e){res.innerHTML=`<div class="empty-st" style="color:#f87171">Error: ${xm(e.message)}</div>`;}
  finally{go.disabled=false;}
}

// ─── Init ─────────────────────────────────────────────────────────────────────
(async()=>{ await checkAuth(); loadAll(); })();
